[project]
name = "extract-python"
version = "0.1.0"
description = "Structured content extraction"
authors = [
  { name = "Clément Doumouro", email = "cdoumouro@icij.org" },
]
readme = "README.md"
requires-python = ">=3.10,<=3.12"
dependencies = [
  "icij-worker[amqp,postgres]~=0.17.21",
  "pydantic-settings~=2.8.1"
]

[tool.hatch.build.targets.sdist]
include = ["icij_worker"]

[project.optional-dependencies]
cpu = [
  "docling~=2.26",
  "docling[tesserocr]~=2.26; 'tesseract' in extra",
  "docling[rapidocr]~=2.26; 'rapidocr' in extra",
  "docling[ocrmac]~=2.26; sys_platform == 'darwin'",
  "pytorch-triton-xpu~=3.2; sys_platform == 'linux' and platform_machine == 'x86_64'",
  "marker-pdf>=1.6.2",
  "torch>=2.6,<2.7.0.dev20250309",
  "torchvision~=0.21",
]

miner-u = [
  "detectron2==0.6",
  "doclayout-yolo>=0.0.2b1",
  "paddlepaddle>=3.0.0rc1",
  "magic-pdf[full]~=1.3",
  "torch",
  "torchvision",
]

[tool.uv]
environments = [
  "sys_platform == 'darwin' and platform_machine == 'arm64'",
  "sys_platform == 'linux'",
]
conflicts = [
    [
        { extra = "miner-u" },
        { extra = "cpu" },
    ]
]

[dependency-groups]
dev = [
  "pytest~=8.3.5",
  "pytest-asyncio~=0.25.3",
]

[project.urls]
Homepage = "https://github.com/ICIJ/extract-python"
Repository = "https://github.com/ICIJ/extract-python"
Issues = "https://github.com/ICIJ/extract-python/issues"

[[tool.uv.index]]
name = "myhloli"
url = "https://wheels.myhloli.com/"
explicit = true


[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "pytorch-cpu-nightly"
url = "https://download.pytorch.org/whl/nightly/cpu"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu126"
url = "https://download.pytorch.org/whl/nightly/cu126"
explicit = true

[[tool.uv.index]]
name = "pytorch-xpu"
url = "https://download.pytorch.org/whl/xpu"
explicit = true


[tool.uv.sources]
detectron2 = [
  { index = "myhloli" },
]
torch = [
  { index = "pytorch-xpu", extra = "cpu", marker = "sys_platform == 'linux' and platform_machine == 'x86_64'" },
  { index = "pytorch-cu126", extra = "cpu", marker = "sys_platform == 'linux' and platform_machine != 'x86_64'" },
  { index = "pytorch-cpu-nightly", extra = "cpu", marker = "sys_platform == 'darwin'" },
  { index= "pytorch-cpu", extra = "miner-u" }
]
torchvision = [
  { index = "pytorch-xpu", extra = "cpu", marker = "sys_platform == 'linux' and platform_machine == 'x86_64'" },
  { index = "pytorch-cu126", extra = "cpu", marker = "sys_platform == 'linux' and platform_machine != 'x86_64'" },
  { index = "pytorch-cpu-nightly", extra = "cpu", marker = "sys_platform == 'darwin'" },
  { index= "pytorch-cpu", extra = "miner-u" }
]
pytorch-triton-xpu = [
  { index = "pytorch-xpu", marker = "sys_platform == 'linux' and platform_machine == 'x86_64'" },
  { index = "pytorch-cu126", marker = "sys_platform == 'linux' and platform_machine != 'x86_64'" },
  { index = "pytorch-cpu-nightly", marker = "sys_platform == 'darwin'" },
]

[project.entry-points."icij_worker.APP_HOOK"]
extract_app = "extract_python.app:app"

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
markers = [
  "integration: integration test",
  "miner_u: minerU test which require conflicting extras",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
